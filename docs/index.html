<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statement Margin</title>
    <meta
      name="description"
      content="Personal statement reviewer connected to a live API from GitHub Pages."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="upload">
    <div class="surface-grid" aria-hidden="true"></div>
    <div class="surface-glow surface-glow-left" aria-hidden="true"></div>
    <div class="surface-glow surface-glow-right" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="upload-view" id="upload-view">
        <form id="review-form" class="upload-stage" aria-label="上传个人陈述">
          <label for="draft-input" class="dropzone" id="dropzone" aria-label="上传个人陈述文件">
            <input id="draft-input" name="draft" type="file" accept=".pdf,.doc,.docx,.txt,.md" />
            <span class="dropzone-frame" aria-hidden="true"></span>
            <span class="dropzone-halo" aria-hidden="true"></span>

            <span class="dropzone-content">
              <span class="plus-orb" aria-hidden="true">
                <span class="plus-glyph" aria-hidden="true"></span>
              </span>
              <span class="upload-headline">点击或拖拽上传</span>
              <span class="upload-subtitle">支持 Word、PDF、TXT、Markdown</span>

              <span class="file-types" aria-hidden="true">
                <span class="file-chip file-chip-word">W</span>
                <span class="file-chip file-chip-pdf">P</span>
                <span class="file-chip file-chip-doc">D</span>
                <span class="file-chip file-chip-text">T</span>
              </span>
            </span>
          </label>

          <button class="minimal-button" id="submit-button" type="submit" disabled>批注</button>

          <div class="sr-only" aria-live="polite">
            <span id="engine-status">Checking...</span>
            <span id="template-status">Checking...</span>
            <span id="model-status">Checking...</span>
            <span id="selected-file-name"></span>
            <span id="status-note">初始化中。</span>
          </div>
        </form>
      </section>

      <section class="review-view" id="review-view" hidden>
        <div class="review-layout">
          <section class="document-column">
            <div class="document-card">
              <article class="manuscript" id="manuscript"></article>
            </div>
          </section>

          <aside class="comments-column">
            <h2 class="comments-title">批注</h2>
            <div class="comments-list" id="comments-list"></div>
          </aside>
        </div>
      </section>
    </main>

    <template id="manuscript-section-template">
      <section class="manuscript-section">
        <div class="section-redline"></div>
      </section>
    </template>

    <template id="comment-card-template">
      <button type="button" class="comment-card">
        <strong class="comment-title"></strong>
        <p class="comment-body"></p>
      </button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
