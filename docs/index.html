<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statement Margin</title>
    <meta
      name="description"
      content="Static personal statement review prototype with minimalist upload page and annotation layout."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="upload">
    <div class="surface-grain" aria-hidden="true"></div>

    <main class="app-shell">
      <section class="upload-view" id="upload-view">
        <form id="review-form" class="upload-stage" aria-label="上传个人陈述">
          <h1 class="upload-title">上传个人陈述</h1>

          <label for="file-input" class="dropzone" id="dropzone" aria-label="上传个人陈述文件">
            <input id="file-input" type="file" accept=".pdf,.doc,.docx,.txt,.md" />
            <svg class="dropzone-ring" viewBox="0 0 100 100" aria-hidden="true">
              <circle cx="50" cy="50" r="46" pathLength="360"></circle>
            </svg>
            <span class="plus-glyph" aria-hidden="true"></span>
          </label>

          <button class="minimal-button" id="confirm-button" type="submit" disabled>批注</button>

          <div class="sr-only" aria-live="polite">
            <span id="selected-name"></span>
          </div>
        </form>
      </section>

      <section class="review-view" id="review-view" hidden>
        <div class="review-layout">
          <section class="document-column">
            <div class="document-card">
              <article class="manuscript" id="paper"></article>
            </div>
          </section>

          <aside class="comments-column">
            <h2 class="comments-title">批注</h2>
            <div class="comments-list" id="comments-list"></div>
          </aside>
        </div>
      </section>
    </main>

    <template id="paragraph-template">
      <section class="manuscript-section">
        <div class="section-redline"></div>
      </section>
    </template>

    <template id="comment-template">
      <button class="comment-card" type="button">
        <strong class="comment-title"></strong>
        <p class="comment-body"></p>
      </button>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
